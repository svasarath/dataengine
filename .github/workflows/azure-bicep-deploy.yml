# ============================================================
#  GitHub Actions – Azure Storage Account via Bicep
#  Auth   : OIDC / Federated credentials
#  Trigger: Push to main (infra/** changes only)
# ============================================================

name: Deploy Azure Storage Account

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/azure-storage-deploy.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-storage-deploy
  cancel-in-progress: false

env:
  AZURE_LOCATION:   eastus
  RESOURCE_GROUP:   rg-storage-dev
  BICEP_FILE:       infra/storage.bicep
  PARAMS_FILE:      infra/params/dev.bicepparam
  DEPLOYMENT_NAME:  deploy-storage-${{ github.run_number }}

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 – Lint only (no Azure connection needed)
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep && sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Debug – show repo structure
        run: find . -not -path './.git/*' | sort

      - name: Lint Bicep file
        run: bicep lint ${{ env.BICEP_FILE }}

  # ──────────────────────────────────────────────────────────
  # JOB 2 – Validate + What-If (single job, one runner)
  # ──────────────────────────────────────────────────────────
  validate-and-what-if:
    name: Validate & What-If
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name     ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags     managed-by=github-actions repo=${{ github.repository }}

      - name: Validate Bicep template
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          subscriptionId:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template:          ${{ env.BICEP_FILE }}
          parameters:        ${{ env.PARAMS_FILE }}
          deploymentName:    ${{ env.DEPLOYMENT_NAME }}-validate
          deploymentMode:    Validate

      - name: Run What-If analysis
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  ${{ env.BICEP_FILE }} \
            --parameters     ${{ env.PARAMS_FILE }} \
            --result-format  FullResourcePayloads

  # ──────────────────────────────────────────────────────────
  # JOB 3 – Deploy (same pattern: create RG then deploy)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy Storage Account
    runs-on: ubuntu-latest
    needs: validate-and-what-if

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name     ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags     managed-by=github-actions \
                       repo=${{ github.repository }} \
                       last-deployed=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          subscriptionId:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template:          ${{ env.BICEP_FILE }}
          parameters:        ${{ env.PARAMS_FILE }}
          deploymentName:    ${{ env.DEPLOYMENT_NAME }}
          deploymentMode:    Incremental
          failOnStdErr:      true

      - name: Print deployment outputs
        run: |
          echo "✅ Storage Account deployed successfully!"
          echo "Storage Account : ${{ steps.deploy.outputs.storageAccountName }}"
          echo "Primary Endpoint: ${{ steps.deploy.outputs.primaryBlobEndpoint }}"
          echo "Resource Group  : ${{ env.RESOURCE_GROUP }}"

      - name: Logout from Azure
        if: always()
        run: az logout